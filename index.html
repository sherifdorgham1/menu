<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دواجن ومشويات درغام</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

header {
  text-align:center;
  padding:20px;
}

header img {
  width:120px;
}

h1 {
  color:#ffcc00;
}

.tabs {
  display:flex;
  overflow:auto;
  background:#111;
  position:sticky;
  top:0;
}

.tabs button {
  flex:1;
  padding:15px;
  background:none;
  border:none;
  color:white;
  font-size:16px;
}

.tabs button:hover {
  background:#ff0000;
}

.section {
  padding:15px;
}

.card {
  background:#1a1a1a;
  margin-bottom:15px;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content {
  padding:10px;
}

.price {
  color:#ffcc00;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>دواجن ومشويات درغام</h1>
<p>🔥 انت في أمان 🔥</p>
</header>

<div class="tabs">
<button onclick="show('طيور')">🐔 طيور</button>
<button onclick="show('مقطع')">🔪 مقطع</button>
<button onclick="show('مشويات')">🔥 مشويات</button>
</div>

<div id="content" class="section"></div>

<script>

const sheetURL = "https://opensheet.elk.sh/1k6NxRHJYTSZtmAqkB-P6Qrpylnh5crkaIGkqGjtCoTA/1";

let data = [];

fetch(sheetURL)
.then(res => res.json())
.then(res => {
  data = res;
  show("طيور");
});

function show(cat){
  let html = "";

  data.filter(x => x["القسم"] == cat).forEach(item => {
    html += `
    <div class="card">
      <img src="${item["الصورة"] || 'https://via.placeholder.com/300'}">
      <div class="card-content">
        <div>${item["اسم"]}</div>
        <div class="price">${item["السعر"]} جنيه</div>
      </div>
    </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

</script>

</body>
</html>
